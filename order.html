<!DOCTYPE html>
<html>
<head>
<title>Order Form</title>
<style> .contact-box{
        width: 500px;
        border: 2px solid black;
        padding: 20px;
        margin: 20px auto;
        background-color:grey;
    }
    input[type="submit"]{
    background-color: lightblue;
    color: black;
    display: block;
    text-align:middle;
    margin: 20px auto;
    padding: 10px 20px;
}
input[type="submit"]:hover{
    background-color: darkblue;
    color: white;
}
    
    </style>
</head>
<body>
    <a href="index.html">BACK TO HOME</a>
    <div class="contact-box">

<h1 align="center">Enter Order Details</h1>

<form>

<label>Name:</label>
<input type="text" placeholder="Name"><br><br>

<label>Email:</label>
<input type="email" placeholder="Email"><br><br>

<label>Mobile:</label>
<input type="number" placeholder="Mobile"><br><br>

<label>Item Name:</label>
<input type="text" placeholder="Item Name"><br><br>

<label>Quantity:</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>
<br><br>

<label>Address:</label><br>
<textarea rows="6" cols="50" placeholder="Address"></textarea>

<br><br>
</div>
<div class="box">
    <br>
<input type="submit" value="Submit">
</div>

</form>


</body>
</html>
