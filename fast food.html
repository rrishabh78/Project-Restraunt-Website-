<style>
.logo{
  width:250px;
  height:250px;
  border-radius:50%;
  vertical-align:middle;
  margin-right:10px;
}

h1{
  text-align:center;
  font-size:80px;
}

nav{
  text-align:center;
}

nav a{
  border:3px solid black;
  padding:10px 25px;
  font-size:30px;
  text-decoration:none;
  margin:10px;
  display:inline-block;
}

.dropdown{
  position:relative;
  display:inline-block;
}

.dropdown-content{
  display:none;
  position:absolute;
  background:black;
  width:120px;
  z-index:9999;
  border:3px solid white;
}

.dropdown-content a{
  display:block;
  padding:8px;
  font-size:14px;
  text-decoration:none;
  color:white;
  border-bottom:3px solid gray;
}

.dropdown:hover .dropdown-content{
  display:block;
}

h2{
  text-align:center;
  font-size:40px;
}

.container{
  display:grid;
  grid-template-columns:repeat(2,300px);
  justify-content:center;
  gap:50px;
}

.box{
  width:300px;
  border:3px solid black;
  padding:10px;
  text-align:center;
  box-shadow:2px 2px 8px gray;
}

.box img{
  transition:0.5s;
}

.box img:hover{
  transform:scale(1.1);
}
</style>

</head>

<style>
.slider{
    width:100%;
    overflow:hidden;
    padding:10px 0;
}

.slide-track{
    display:flex;
    width:max-content;
    animation:scroll 20s linear infinite;
}

.slide-track img{
    width:300px;
    height:200px;
    border:3px solid black;
    margin-right:15px;
    border-radius:10px;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}
</style>
